<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión SELVIA</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      margin: 20px;
    }
    h1 {
      color: #1B3A57;
    }
    button {
      background-color: #1B3A57;
      color: white;
      font-size: 18px;
      padding: 15px 30px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:disabled {
      background-color: #999;
      cursor: not-allowed;
    }
    #resultado {
      margin-top: 20px;
      font-size: 16px;
      color: #333;
    }
  </style>
</head>
<body>
  <h1>Gestión SELVIA</h1>
  <button id="contarBtn">Contar archivos en el CDE</button>
  <div id="resultado"></div>

  <script>
    const clientId = "31d42c3e-aacc-492e-a3a1-fd9903ae2c50"; // Tu Client ID
    const redirectUri = window.location.origin + window.location.pathname; 
    let accessToken = null;

    async function login() {
      const authUrl = `https://identity.trimble.com/oauth/authorize?response_type=token&client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}`;
      window.location.href = authUrl;
    }

    function getTokenFromUrl() {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      return params.get("access_token");
    }

    async function contarArchivos() {
      const resultado = document.getElementById("resultado");
      const btn = document.getElementById("contarBtn");
      btn.disabled = true;
      resultado.textContent = "Contando archivos, por favor espera...";

      try {
        const response = await fetch("https://app.connect.trimble.com/tc/api/2.0/files", {
          headers: { Authorization: "Bearer " + accessToken }
        });

        if (!response.ok) throw new Error("Error en la conexión");

        const data = await response.json();
        const total = data.length;

        resultado.textContent = "Total de archivos en el CDE: " + total;
      } catch (error) {
        resultado.textContent = "Error: no se pudo conectar al CDE.";
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("contarBtn").addEventListener("click", () => {
      if (!accessToken) {
        login();
      } else {
        contarArchivos();
      }
    });

    accessToken = getTokenFromUrl();
  </script>
</body>
</html>
